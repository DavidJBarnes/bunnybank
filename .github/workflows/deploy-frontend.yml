name: Deploy · Parent App

on:
  push:
    branches: [main]
    paths:
      - "parent_app/**"
      - "nginx/bunnybank-gateway.conf"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_NGINX: bunnybank-nginx
  WEB_ROOT: /opt/bunnybank/parent-web
  API_BASE_URL: https://bunnybank-api.davidjbarnes.com/api/v1
  PARENT_DOMAIN: bunnybank-parent.davidjbarnes.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Build Flutter web (native)
        working-directory: parent_app
        run: |
          flutter pub get
          flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push asset transport image (arm64)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f parent_app/Dockerfile.web \
            -t $ECR_REGISTRY/$ECR_NGINX:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_NGINX:latest \
            --push \
            parent_app

      - name: Deploy via SSM
        id: ssm
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_NGINX:$IMAGE_TAG"
          NGINX_B64=$(base64 -w0 nginx/bunnybank-gateway.conf)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "IMAGE='"$IMAGE"'",
              "NGINX_B64='"$NGINX_B64"'",
              "WEB_ROOT='"$WEB_ROOT"'",
              "AWS_REGION='"$AWS_REGION"'",
              "ECR_REGISTRY='"$ECR_REGISTRY"'",
              "PARENT_DOMAIN='"$PARENT_DOMAIN"'",
              "echo === Logging into ECR ===",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY",
              "echo === Pulling asset image ===",
              "docker pull $IMAGE",
              "echo === Extracting static assets to host - atomic swap ===",
              "docker rm -f bb-parent-extract 2>/dev/null || true",
              "docker create --name bb-parent-extract $IMAGE",
              "rm -rf ${WEB_ROOT}.new && mkdir -p ${WEB_ROOT}.new",
              "docker cp bb-parent-extract:/web/. ${WEB_ROOT}.new/",
              "docker rm bb-parent-extract",
              "test -f ${WEB_ROOT}.new/index.html",
              "mkdir -p $WEB_ROOT",
              "rm -rf ${WEB_ROOT}.old",
              "mv $WEB_ROOT ${WEB_ROOT}.old 2>/dev/null || true",
              "mv ${WEB_ROOT}.new $WEB_ROOT",
              "rm -rf ${WEB_ROOT}.old",
              "chmod -R a+rX $WEB_ROOT",
              "chcon -R -t httpd_sys_content_t $WEB_ROOT 2>/dev/null || true",
              "echo === Syncing nginx gateway config ===",
              "echo $NGINX_B64 | base64 -d > /etc/nginx/conf.d/bunnybank.conf",
              "nginx -t && systemctl reload nginx",
              "echo === Verifying parent app is served ===",
              "OK=0; for i in 1 2 3 4 5; do if curl -skf -H \"Host: $PARENT_DOMAIN\" https://127.0.0.1/ -o /tmp/idx.html; then if grep -qi flutter /tmp/idx.html; then OK=1; break; fi; fi; echo attempt $i...; sleep 3; done",
              "if [ $OK -eq 1 ]; then echo === Parent app served OK ===; docker image prune -f 2>/dev/null || true; else echo === FAILED: parent app not served ===; head -20 /tmp/idx.html 2>/dev/null || true; exit 1; fi",
              "echo === Deploy complete ==="
            ]' \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          echo "SSM CommandId: $COMMAND_ID"
          echo "View in AWS Console: https://${AWS_REGION}.console.aws.amazon.com/systems-manager/run-command/${COMMAND_ID}"
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query 'StandardOutputContent' --output text
                exit 0 ;;
              Failed|TimedOut|Cancelled|DeliveryTimedOut|ExecutionTimedOut|AccessDenied|InvalidPlatform|Undeliverable|Terminated)
                echo "--- STATUS: $STATUS ---"
                echo "--- STDOUT ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query 'StandardOutputContent' --output text
                echo "--- STDERR ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query 'StandardErrorContent' --output text
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "Timed out waiting for SSM command"; exit 1
