# BunnyBank host-level nginx gateway.
# Lives at /etc/nginx/conf.d/bunnybank.conf — independent of deepodds.conf.
# Terminates TLS for bunnybank-api + bunnybank-parent and reverse-proxies to
# local containers (API on 127.0.0.1:8005, parent app on 127.0.0.1:8086).
# TLS cert (single cert, both names as SANs):
#   /etc/letsencrypt/live/bunnybank-api.davidjbarnes.com/

# ---- HTTP: ACME challenge + redirect to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name bunnybank-api.davidjbarnes.com bunnybank-parent.davidjbarnes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: API ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bunnybank-api.davidjbarnes.com;

    ssl_certificate     /etc/letsencrypt/live/bunnybank-api.davidjbarnes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bunnybank-api.davidjbarnes.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ /\. {
        deny all;
    }
}

# ---- HTTPS: Parent app (Flutter web, static files served directly by host nginx) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bunnybank-parent.davidjbarnes.com;

    ssl_certificate     /etc/letsencrypt/live/bunnybank-api.davidjbarnes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bunnybank-api.davidjbarnes.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /opt/bunnybank/parent-web;
    index index.html;

    # SPA fallback so client-side routes resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the app shell / service worker, so new deploys take effect immediately.
    location = /index.html               { add_header Cache-Control "no-store"; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-store"; }
    location = /flutter_bootstrap.js      { add_header Cache-Control "no-store"; }

    location ~ /\. {
        deny all;
    }
}
