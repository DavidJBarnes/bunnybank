<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BunnyBank — Get the App</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #00C853; color: #0b3d1e;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 32px 28px; max-width: 360px;
      box-shadow: 0 12px 40px rgba(0,0,0,.2); text-align: center;
    }
    h1 { margin: 0 0 4px; font-size: 30px; }
    p { color: #355; line-height: 1.5; }
    .btn {
      display: inline-block; margin: 18px 0 8px; padding: 16px 28px; font-size: 18px; font-weight: 700;
      background: #00C853; color: #fff; text-decoration: none; border-radius: 16px;
    }
    ol { text-align: left; color: #355; font-size: 14px; line-height: 1.6; padding-left: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐰 BunnyBank</h1>
    <p>Install the BunnyBank app on your Android phone.</p>
    <a class="btn" href="/bunnybank.apk">⬇️ Download BunnyBank</a>
    <ol>
      <li>Tap <b>Download BunnyBank</b>.</li>
      <li>Open the downloaded file. If asked, allow installs from this source.</li>
      <li>Open the app and tap <b>Allow</b> for notifications.</li>
      <li>Log in with the <b>ID and PIN</b> from your parent.</li>
    </ol>
  </div>
</body>
</html>
