version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bunnybank
      POSTGRES_USER: bunnybank
      POSTGRES_PASSWORD: bunnybank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunnybank"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bunnybank:bunnybank@db:5432/bunnybank
      JWT_SECRET: dev-secret-change-in-production
      FIREBASE_CREDENTIALS_FILE: /app/firebase-service-account.json
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
